site_name: PyMoX Mkdocs Material Doc
site_url: https://pymox-fr.github.io/
repo_url: https://github.com/PyMoX-fr.github.io

# language: fr # * [ ] Set language
# lang: fr # * [ ] Set language
# locale: fr

nav:
    - index.md  # The documentation homepage.
    - about.md  # The about page.

theme:
    name: material
    # lang: fr # * [ ] Set language
    # locale: fr
    font: 
        text: Comic Neue
        # text: Merriweather Sans
        code: Red Hat Mono
    # font-size: 24px
    
    # favicon: site/assets/images/favicon.png
    # logo: site/assets/images/favicon.png
    features:
        - navigation.tabs
        - navigation.sections
        - search.suggest
        - content.code.copy
    palette:
        # scheme: slate
        # # primary: orange
        # # accent: cyan
        # primary: cyan
        # accent: orange
      - scheme: slate
        toggle:
          icon: material/weather-sunny
          name: Dark
        primary: blue
        # primary: slate
        accent: orange
        
      - scheme: default
        toggle:
          icon: material/weather-night
          name: light Light
        # primary: deep purple
        primary: blue
        # primary: blue
        accent: deep orange
          
        # primary: orange
        # accent: cyan
        # primary: cyan
        # accent: orange

markdown_extensions:
- markdown.extensions.admonition
- markdown.extensions.toc
- pymdownx.betterem
- pymdownx.caret
- pymdownx.inlinehilite
- pymdownx.magiclink
- pymdownx.mark
- pymdownx.smartsymbols
- pymdownx.superfences
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.tilde
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg

