name: Deploy Docs

on:
  push:
    branches: [main]
  schedule:
    # - cron: '0 3 * * *' # Tous les jours à 3 H (AM)
    # - cron: '0 * * * *' # Toutes les heures
    - cron: '*/5 * * * *' # Toutes les 5 minutes
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: 🛠️ Installer les dépendances MkDocs
        run: |
          pip install --upgrade pip
          pip install mkdocs mkdocs-material pyodide-mkdocs-theme mkdocs-awesome-pages-plugin

      - name: 📋 Push si CRON, mets à jour deploy_info.md et build-log.txt
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="$(TZ='Europe/Paris' date '+%d/%m/%Y - %H:%M:%S')"
          MSG="$(git log -1 --pretty=%B)"
          AUTOR="$(git log -1 --pretty=%an)"
          SHA="${{ github.sha }}"
          
          echo "🚀 Déploiement déclenché par le commit suivant :"
          echo "📅 Date      : $DATA
          echo "🗒️ Message   : $MSG
          echo "👤 Auteur    : $AUTOR
          echo "🔢 SHA       : $SHA
          
          # Pour deploy-info (- et non _ car fichier AUTO)
          echo "# 🛠️ Déploiement MkDocs" >> docs/deploy-info.md
          echo "" >> docs/deploy-info.md
          echo "**Dernier build :** $DATE" >> docs/deploy-info.md
          echo "**Commit SHA :** \`$SHA\`" >> docs/deploy-info.md
          echo "**Message :** $MESSAGE" >> docs/deploy-info.md
          echo "**Auteur :** $AUTEUR" >> docs/deploy-info.md

          if [[ "$MSG" == ⏱️* ]]; then
            echo "Dernier rebuild (COMMIT AUTO): $DATE" >> build-log.txt
          else
            echo "Commit ($MSG < $AUTEUR): $DATE" >> build-log.txt
          fi

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add build-log.txt
          git commit -m "⏱️ Rebuild automatique CRON ($DATE)"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}
          git push

          mkdocs gh-deploy --force
