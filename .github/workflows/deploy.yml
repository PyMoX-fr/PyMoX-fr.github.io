name: Deploy Docs (sans commit dans main)

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: 🛠️ Installer MkDocs & plugins
        run: |
          pip install --upgrade pip
          pip install mkdocs mkdocs-material pyodide-mkdocs-theme mkdocs-awesome-pages-plugin

      - name: 📋 Génère deploy-info.md
        env:
          SHA: ${{ github.sha }}
        run: |
          DATE="$(TZ='Europe/Paris' date '+%d/%m/%Y - %H:%M:%S')"
          MSG="$(git log -1 --pretty=%B)"
          AUTOR="$(git log -1 --pretty=%an)"
          
          mkdir -p "docs/xtra/logs"
          echo "# 🛠️ Déploiement MkDocs" > docs/xtra/logs/deploy-info.md
          echo "" >> docs/xtra/logs/deploy-info.md
          echo "- 📅 **Date** : $DATE" >> docs/xtra/logs/deploy-info.md
          echo "- 📝 **Message** : $MSG" >> docs/xtra/logs/deploy-info.md
          echo "- 👤 **Auteur** : $AUTOR" >> docs/xtra/logs/deploy-info.md
          echo "- 🔢 **SHA** : \`$SHA\`" >> docs/xtra/logs/deploy-info.md
          echo "" >> docs/xtra/logs/deploy-info.md
          echo "> Déploiement déclenché par push sur la branche *main*." >> docs/xtra/logs/deploy-info.md

      - name: 🏗️ Build site MkDocs
        run: mkdocs build

      - name: 📦 Injecte le log dans le site généré
        run: |
          cp docs/xtra/logs/deploy-info.md site/xtra/logs/deploy-info.md

      - name: 🚀 Déploie vers gh-pages
        run: mkdocs gh-deploy --force
