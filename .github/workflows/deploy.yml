name: Deploy Docs

on:
  push:
    branches: [main]
  schedule:
    # - cron: '0 3 * * *' # Tous les jours à 3 H (AM)
    - cron: '*/5 * * * *' # Toutes les 5 minutes
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - run: pip install mkdocs mkdocs-material pyodide-mkdocs-theme mkdocs-awesome-pages-plugin
      - run: mkdocs gh-deploy --force
