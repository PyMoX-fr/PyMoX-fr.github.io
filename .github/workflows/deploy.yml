name: Deploy Docs (sans re-commit dans main)

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: рџ› пёЏ Install MkDocs & plugins
        run: |
          pip install --upgrade pip
          pip install mkdocs mkdocs-material pyodide-mkdocs-theme mkdocs-awesome-pages-plugin mkdocs-open-in-new-tab

      - name: рџ“‹ GГ©nГЁre deploy_info.md
        env:
          SHA: ${{ github.sha }}
        run: |
          DEPLOY_INFO_DIR="docs/outils/logs"
          DEPLOY_INFO_FILE="deploy_info.md"
          DEPLOY_INFO_PATH="$DEPLOY_INFO_DIR/$DEPLOY_INFO_FILE"

          mkdir -p "$DEPLOY_INFO_DIR"


          LAST_COMMIT_MSG="$(git log -1 --pretty=%B)"

          if [[ "$LAST_COMMIT_MSG" =~ ^Merge.*github\.io$ ]]; then
            PREV_SHA="$(git rev-parse HEAD^)"
            MSG="$(git show -s --format=%B "$PREV_SHA")"
            AUTOR="$(git show -s --format=%an "$PREV_SHA")"

            # # Fallback si MSG vide
            # if [[ -z "$MSG" ]]; then
            #   echo "вљ пёЏ Le message du commit prГ©cГ©dent est vide !"
            #   MSG="[commit prГ©cГ©dent vide ou inaccessible]"
            # fi
          else
            MSG="$LAST_COMMIT_MSG"
            AUTOR="$(git log -1 --pretty=%an)"
          fi


          DATE_HUMAN="$(TZ='Europe/Paris' date '+%d/%m/%Y')"
          TIME_HUMAN="$(TZ='Europe/Paris' date '+%H:%M:%S')"
          DATE_ISO="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          DATE_UNIX="$(date +%s)"

          # SHA="${{ github.sha }}"

          echo "" >> "$DEPLOY_INFO_PATH"

          echo "# рџљЂ Dernier dГ©ploiement" > "$DEPLOY_INFO_PATH"
          echo "" >> "$DEPLOY_INFO_PATH"

          echo "## в†’ Suite Г  push manuel" >> "$DEPLOY_INFO_PATH"
          echo "" >> "$DEPLOY_INFO_PATH"

          echo "| рџ“… Date        | рџ•°пёЏ Heure (Paris)       | рџЊђ ISO 8601 UTC         | рџ”ў Timestamp UNIX |" >> "$DEPLOY_INFO_PATH"
          echo "|----------------|------------------------|------------------------|--------------------|" >> "$DEPLOY_INFO_PATH"
          echo "| **$DATE_HUMAN**  | **$TIME_HUMAN**        | \`$DATE_ISO\`   | \`$DATE_UNIX\`       |" >> "$DEPLOY_INFO_PATH"
          echo "" >> "$DEPLOY_INFO_PATH"

          echo "### рџ“‹ Informations de dГ©ploiement" >> "$DEPLOY_INFO_PATH"
          echo "" >> "$DEPLOY_INFO_PATH"
          echo "рџ“ќ Message Git : **${MSG}**<br>" >> "$DEPLOY_INFO_PATH"
          echo "рџ‘¤ Auteur : ${AUTOR}<br>" >> "$DEPLOY_INFO_PATH"
          echo "рџ”Ѓ SHA Commit : \`${SHA}\`<br>" >> "$DEPLOY_INFO_PATH"
          echo "рџљЂ **DГ©clencheur** : Push manuel sur la branche \`main\`" >> "$DEPLOY_INFO_PATH"
          echo "<br><br>" >> "$DEPLOY_INFO_PATH"

          echo "> вњ… Ce dГ©ploiement a Г©tГ© lancГ© automatiquement suite au push manuel sur \`main\` (Sans commit permanent du fichier deploy-info.md dans l'historique Git)." >> "$DEPLOY_INFO_PATH"

      - name: рџЏ—пёЏ Build site MkDocs
        run: mkdocs build

      - name: рџ“¦ Injecte le log dans le site gГ©nГ©rГ©
        run: |
          cp docs/outils/logs/deploy_info.md site/outils/logs/deploy_info.md

      - name: рџЊђ Ajoute le fichier CNAME et le copie
        run: |
          echo "pymox.fr" > site/CNAME
          [ -f site/CNAME ] && cp site/CNAME CNAME
           
      - name: рџЊђ Copie README.md
        run: cp README.md site/README.md
      - name: рџЊђ Ajoute le fichier CNAME et le copie
        run: |
          echo "pymox.fr" > site/CNAME
          [ -f site/CNAME ] && cp site/CNAME CNAME

      - name: рџљЂ DГ©ploie vers gh-pages
        run: mkdocs gh-deploy --force
