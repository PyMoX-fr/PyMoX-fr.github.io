name: Deploy Docs (CRON 3h)

on:
  schedule:
    # - cron: '0 3 * * *' # Tous les jours à 3h du matin
    - cron: '0 * * * *' # Toutes les heures
    # - cron: '*/15 * * * *' # Toutes les 15 minutes
    # - cron: "*/5 * * * *" # Toutes les 5 minutes
jobs:
  daily-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: 🛠️ Installer MkDocs + plugins
        run: |
          pip install --upgrade pip
          pip install mkdocs mkdocs-material pyodide-mkdocs-theme mkdocs-awesome-pages-plugin mkdocs-open-in-new-tab

      - name: ⏱️ Build CRON silencieux
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          DATE="$(TZ='Europe/Paris' date '+%d/%m/%Y - %H:%M:%S')"
          MSG="$(git log -1 --pretty=%B)"
          AUTOR="$(git log -1 --pretty=%an)"

          DEPLOY_INFO_FILE="docs/xtra/logs/deploy-info.md"
          mkdir -p "$(dirname "$DEPLOY_INFO_FILE")"

          echo "# ⏱️ Déploiement quotidien MkDocs" > "$DEPLOY_INFO_FILE"
          echo "" >> "$DEPLOY_INFO_FILE"
          echo "- 📅 **Date** : $DATE" >> "$DEPLOY_INFO_FILE"
          echo "- 📝 **Message** : $MSG" >> "$DEPLOY_INFO_FILE"
          echo "- 👤 **Auteur** : $AUTOR" >> "$DEPLOY_INFO_FILE"
          echo "- 🔢 **SHA** : \`$SHA\`" >> "$DEPLOY_INFO_FILE"
          echo "" >> "$DEPLOY_INFO_FILE"
          echo "> Ce déploiement a été effectué automatiquement chaque jour à 3h par GitHub Actions." >> "$DEPLOY_INFO_FILE"

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add "$DEPLOY_INFO_FILE"
          git commit -m "⏱️ Déploiement quotidien CRON ($DATE)"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}
          git push

          mkdocs gh-deploy --force

          # Créer un tag automatiquement:
          #   git tag -a "cron-deploy-$(date +%Y%m%d%H%M)" -m "Déploiement CRON automatique"
          
